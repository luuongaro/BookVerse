spring:
  application:
    name: BookVerse
  datasource:
    url: ${BOOKS_VERSE_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

google:
  books:
    api:
      url: ${GOOGLE_BOOKS_API_URL}
      key: ${GOOGLE_BOOKS_API_KEY}
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

  app:
    admin:
      username: ${ADMIN_USERNAME}
      email: ${ADMIN_EMAIL}
      password: ${ADMIN_PASSWORD}