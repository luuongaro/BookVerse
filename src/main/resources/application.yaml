spring:
  application:
    name: BookVerse
  datasource:
    url: jdbc:postgresql://localhost:5432/bookVerse
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

google:
  books:
    api:
      url: ${GOOGLE_BOOKS_API_URL}
      key: ${GOOGLE_BOOKS_API_KEY}
