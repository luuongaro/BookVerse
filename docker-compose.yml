services:
  postgres:
    image: postgres:17-alpine
    container_name: bookverse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookverse}
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - bookverse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookverse} -d ${POSTGRES_DB:-bookverse}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bookverse_postgres_data:
